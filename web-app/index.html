<!-- In HTML Comments are written like this -->
<!-- They can all be removed for your apps -->
<!doctype html> <!-- This first line tells browsers to expect modern standard html 5 -->
<meta charset="utf-8"> <!-- This indicates how the file is encoded. utf-8 is standard -->
<title>Orbito</title> <!-- All pages need a title, this will be displayed in the browser's title bar -->
<!--<script type="module" src="main.js"></script>--->
<!-- Load the main script. Must be type="module". Have only one of these -->
<html lang="en-gb"> <!-- This is indicates the page is written in British English, useful for accessibility -->

<head>
    <meta charset="utf-8"> <!-- This indicates how the file is encoded. utf-8 is standard -->
    <meta name="viewport" content="width=device-width,
    initial-scale=1">
    <link rel="stylesheet" href="default.css"> <!-- Import style sheet – default.css -->
</head>


<body>
    <script type="module">
        import { initUI } from './main.js';
        initUI();
    </script>
    <div class="top-controls">
        <button id="btn-restart" class="control-btn">New Game (N)</button>
        <button id="btn-rules" class="control-btn">Rules (R)</button>
        <a href="../docs/index.html" target="_blank">
            <button id="btn-docs" class="docs-btn">API Docs</button>
        </a>
    </div>

    <div class="page-container">
        <img class="orbito-logo" id="orbito-logo" src="assets/ORBITO.svg" alt="Orbito Logo" width="500px" height="170">
        <div class="game-area">
            <div class="score-box player1-score">
                <p id="score-p1">0</p>
            </div>

            <section class="board">
                <div class="cell arrow south"></div>
                <div class="cell arrow west"></div>
                <div class="cell arrow west"></div>
                <div class="cell arrow west"></div>

                <div class="cell arrow south"></div>
                <div class="cell arrow south"></div>
                <div class="cell arrow west"></div>
                <div class="cell arrow north"></div>

                <div class="cell arrow south"></div>
                <div class="cell arrow east"></div>
                <div class="cell arrow north"></div>
                <div class="cell arrow north"></div>

                <div class="cell arrow east"></div>
                <div class="cell arrow east"></div>
                <div class="cell arrow east"></div>
                <div class="cell arrow north"></div>
            </section>

            <div class="score-box player2-score">
                <p id="score-p2">0</p>
            </div>
        </div>
    </div>

    <!-- Result popup – style via .result-overlay / .result-popup in default.css -->
    <div class="result-overlay" id="result-overlay">
        <div class="result-popup">
            <p class="result-popup__message" id="result-message"></p>
            <button class="result-popup__button" id="result-play-again">Play Again</button>
        </div>
    </div>

    <!-- Rules popup -->
    <div class="result-overlay" id="rules-overlay">
        <div class="rules-popup">
            <button class="rules-close-btn" id="rules-close">&times;</button>
            <img src="assets/Gamerules.svg" alt="Game Rules" class="rules-img">
        </div>
    </div>
</body>

</html>
